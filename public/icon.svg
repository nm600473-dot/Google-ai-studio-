<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with dark blue gradient matching Areka's theme -->
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1E2E4A" />
      <stop offset="100%" stop-color="#07111F" />
    </radialGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Card Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  
  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#2563EB" stroke-width="4" stroke-opacity="0.3" />

  <!-- Abstract stylized glowing 'A' / Book / Infinite loops structure -->
  <g transform="translate(256, 256)" filter="url(#glow-filter)">
    <!-- Right side wing/arc of 'A' -->
    <path d="M-80,120 L-20,-80 C-10,-110 10,-110 20,-80 L80,120" 
          fill="none" 
          stroke="url(#glow-grad)" 
          stroke-width="40" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Left loop of infinity/book pages inside 'A' -->
    <path d="M-120,40 C-60,40 -20,-10 -60,-50 C-100,-90 -160,-50 -120,40 Z" 
          fill="none" 
          stroke="#60A5FA" 
          stroke-width="20" 
          stroke-linecap="round" />
          
    <!-- Right loop of infinity/book pages inside 'A' -->
    <path d="M120,40 C60,40 20,-10 60,-50 C100,-90 160,-50 120,40 Z" 
          fill="none" 
          stroke="#3B82F6" 
          stroke-width="20" 
          stroke-linecap="round" />

    <!-- Sleek crossbar of 'A' (resembles a glowing electronic band or open notebook) -->
    <path d="M-90,20 L90,20" 
          fill="none" 
          stroke="#93C5FD" 
          stroke-width="24" 
          stroke-linecap="round" />
          
    <!-- Central core glow dot -->
    <circle cx="0" cy="-20" r="16" fill="#FFFFFF" opacity="0.9" />
  </g>
</svg>
